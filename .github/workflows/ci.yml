name: CI

"on":
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          # Nothing here pushes; keep the token out of .git/config while
          # building and testing PR code.
          persist-credentials: false

      # Installs the pnpm version pinned in package.json's packageManager
      # field. Third-party action pinned to a commit SHA (v4).
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      # E2E smoke (no snapshot baseline required)
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Smoke test
        run: pnpm exec playwright test e2e/smoke.spec.ts
