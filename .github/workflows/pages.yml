name: Deploy GitHub Pages

# Builds from source and deploys to GitHub Pages on every push to main, so
# the published demo can never go stale relative to the merged code. The
# repository's Pages settings must have "GitHub Actions" as the source.

"on":
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Nothing here pushes; keep the token out of .git/config during the
          # dependency build.
          persist-credentials: false

      # Installs the pnpm version pinned in package.json's packageManager
      # field. Third-party action pinned to a commit SHA (v4).
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build with the Pages base path
        env:
          # Project pages are served under /<repo-name>/ — derive it instead
          # of hardcoding so forks deploy without edits.
          VITE_BASE: /${{ github.event.repository.name }}/
        run: pnpm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
