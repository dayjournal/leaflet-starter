name: Dependency Auto Update

# Daily flow: detect newer leaflet/typescript/vite versions, gate each group
# with build + e2e (visual diff vs pre-update main + runtime error check),
# open a PR with the passing updates, and notify Slack. A human merges the PR;
# CI then runs on main, the Release workflow tags + publishes, and the Pages
# workflow redeploys the demo — all automatically.
# On failure nothing is pushed anywhere — Slack gets the details.
# Quiet days send nothing, except a heartbeat every 10th day proving the
# schedule is still alive.

"on":
  schedule:
    - cron: "0 21 * * *" # 6:00 JST
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run all checks but skip PR creation"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  actions: write # keepalive re-enables this schedule via API

concurrency:
  group: deps-autoupdate
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          # Resolve main at fetch time, not event time: a queued run must not
          # re-apply updates that a previous run already turned into a PR.
          ref: main
          fetch-depth: 0
          # This job builds and tests freshly-updated third-party code; do not
          # leave the contents:write token in .git/config where that code
          # could read it. Create Pull Request pushes with its own token input.
          persist-credentials: false

      # Installs the pnpm version pinned in package.json's packageManager
      # field. Third-party action pinned to a commit SHA (v4).
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install deps (base)
        id: install_base
        run: pnpm install --frozen-lockfile

      - name: Build (base)
        id: build_base
        run: pnpm run build

      - name: Install Playwright browsers
        id: browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Baseline screenshots from current main
        id: baseline
        run: pnpm exec playwright test e2e/visual.spec.ts --update-snapshots

      # Updates each dependency group, gates it with build + e2e (rolling back
      # groups that fail), bumps the project version, rewrites README versions,
      # and writes artifacts/pr-body.md. Emits step outputs: changed / delta /
      # prev_version / next_version / updated_packages / failed_groups.
      - name: Update dependencies
        id: update
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node .github/scripts/deps-check-and-update.mjs

      # Human-facing canonical screenshot committed with the PR. Byte-identical
      # render -> no diff entry (pixel-identical, nothing to review); when the
      # render did change, GitHub's image diff viewers (2-up / swipe / onion
      # skin) apply. The PR body also embeds before/after raw URLs of this
      # file (see writePrBody in deps-check-and-update.mjs).
      - name: Refresh canonical screenshot
        if: steps.update.outputs.changed == 'true'
        run: |
          pnpm exec playwright test e2e/visual.spec.ts --update-snapshots
          mkdir -p e2e/screenshots
          cp .playwright-snapshots/visual.spec.ts-snapshots/map-*.png e2e/screenshots/map.png

      - name: Create Pull Request
        id: cpr
        if: steps.update.outputs.changed == 'true' && inputs.dry_run != true
        # Third-party action pinned to a commit SHA (v6) — this workflow's
        # token can write contents, so a hijacked tag must not be able to
        # swap the code underneath us.
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c
        with:
          # github.token works because "Allow GitHub Actions to create and
          # approve pull requests" is enabled. Set secrets.PR_TOKEN (fine-
          # grained PAT) only if CI should also run on the bot PR.
          token: ${{ secrets.PR_TOKEN || github.token }}
          branch: bot/deps-update
          delete-branch: true
          title: "chore: bump deps to v${{ steps.update.outputs.next_version }} (${{ steps.update.outputs.delta }})"
          commit-message: "chore: bump deps to v${{ steps.update.outputs.next_version }} (${{ steps.update.outputs.delta }})"
          body-path: artifacts/pr-body.md
          labels: dependencies
          add-paths: |
            package.json
            pnpm-lock.yaml
            README.md
            e2e/screenshots/map.png

      - name: Upload artifacts
        if: ${{ always() && (failure() || steps.update.outputs.changed == 'true' || steps.update.outputs.failed_groups != '') }}
        uses: actions/upload-artifact@v4
        with:
          name: deps-update-artifacts
          path: |
            artifacts/
            test-results/
            playwright-report/
            .playwright-snapshots/
          if-no-files-found: ignore
          retention-days: 14
          # Without this, dot-directories like .playwright-snapshots are
          # silently dropped from the artifact (upload-artifact v4 default).
          include-hidden-files: true

      # Message logic (including the 10-day heartbeat) lives in
      # .github/scripts/notify-slack.sh; this step only maps step results
      # into its environment.
      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          CHANGED: ${{ steps.update.outputs.changed }}
          DELTA: ${{ steps.update.outputs.delta }}
          NEXT_VERSION: ${{ steps.update.outputs.next_version }}
          FAILED_GROUPS: ${{ steps.update.outputs.failed_groups }}
          PR_URL: ${{ steps.cpr.outputs.pull-request-url }}
          DRY_RUN: ${{ inputs.dry_run }}
          O_INSTALL_BASE: ${{ steps.install_base.outcome }}
          O_BUILD_BASE: ${{ steps.build_base.outcome }}
          O_BROWSERS: ${{ steps.browsers.outcome }}
          O_BASELINE: ${{ steps.baseline.outcome }}
          O_UPDATE: ${{ steps.update.outcome }}
          O_CPR: ${{ steps.cpr.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bash .github/scripts/notify-slack.sh

      - name: Fail run if some groups were excluded
        if: steps.update.outputs.failed_groups != ''
        run: |
          echo "::error::Dependency groups failed checks: ${{ steps.update.outputs.failed_groups }}"
          exit 1

      # GitHub disables cron workflows after 60 days without repo activity;
      # re-enabling this workflow via the Actions API resets that timer.
      - name: Keepalive
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method PUT \
            "repos/${{ github.repository }}/actions/workflows/deps-autoupdate.yml/enable" \
            || echo "::warning::Keepalive failed; the schedule may be disabled after 60 idle days"
